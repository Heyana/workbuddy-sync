<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBuddy Memory — 用户记忆知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #faf9f6;
    --surface: #f3f1ec;
    --surface-raised: #ece9e3;
    --border: #e0dcd5;
    --text: #1a1714;
    --text-muted: #6b6560;
    --accent: #c45a3c;
    --accent-dim: rgba(196, 90, 60, 0.08);
    --red: #d94040;
    --green: #3a8a4a;
    --max-w: 960px;
    --gap: clamp(1rem, 3vw, 2rem);
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }

  /* loading indicator */
  #loading{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'DM Mono',monospace;font-size:0.8125rem;color:var(--text-muted);
    z-index:10;
  }

  /* sidebar */
  aside{
    position:fixed;top:0;left:0;bottom:0;width:260px;
    background:var(--surface);
    border-right:1px solid var(--border);
    overflow-y:auto;z-index:50;
    padding:2rem 0;
  }
  .sidebar-header{
    padding:0 1.5rem 1.5rem;
    border-bottom:1px solid var(--border);
    margin-bottom:1rem;
  }
  .sidebar-header h1{
    font-size:1rem;font-weight:700;line-height:1.3;
  }
  .sidebar-header .sub{
    font-family:'DM Mono',monospace;
    font-size:0.625rem;color:var(--accent);text-transform:uppercase;
    letter-spacing:0.12em;margin-top:0.5rem;
  }
  .sidebar-header .stats{
    font-family:'DM Mono',monospace;font-size:0.6875rem;color:var(--text-muted);
    margin-top:0.75rem;
  }

  nav ul{list-style:none}
  nav .nav-group{
    padding:0.5rem 1.5rem;
    font-family:'DM Mono',monospace;font-size:0.625rem;
    text-transform:uppercase;letter-spacing:0.1em;
    color:var(--accent);margin-top:1.25rem;
  }
  nav a{
    display:block;padding:0.375rem 1.5rem;
    font-size:0.8125rem;color:var(--text-muted);
    text-decoration:none;transition:all 0.15s;
    border-left:2px solid transparent;
  }
  nav a:hover,nav a.active{
    color:var(--text);
    background:var(--accent-dim);
    border-left-color:var(--accent);
  }

  /* main */
  main{
    margin-left:260px;
    padding:2rem var(--gap);
    max-width:calc(var(--max-w) + var(--gap)*2);
  }

  /* overview card */
  .overview{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:2px;
    padding:2rem;
    margin-bottom:2rem;
  }
  .overview h2{
    font-size:1.25rem;font-weight:700;margin-bottom:0.75rem;
  }
  .overview p{
    font-size:0.875rem;color:var(--text-muted);margin-bottom:1rem;
    line-height:1.6;
  }
  .overview blockquote{
    border-left:2px solid var(--accent);padding:0.5rem 1rem;
    margin:1rem 0;font-size:0.8125rem;color:var(--text-muted);
    background:var(--accent-dim);
  }

  /* topic card */
  .topic-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:2px;
    padding:2rem;
    margin-bottom:1.5rem;
    transition:border-color 0.25s;
  }
  .topic-card:hover{border-color:var(--accent-dim)}

  .topic-card .topic-meta{
    font-family:'DM Mono',monospace;font-size:0.625rem;
    text-transform:uppercase;letter-spacing:0.1em;
    color:var(--accent);margin-bottom:0.75rem;
  }

  .topic-card h2{
    font-size:1.25rem;font-weight:700;margin-bottom:1rem;
    padding-bottom:0.75rem;border-bottom:1px solid var(--border);
  }
  .topic-card h3{
    font-size:1rem;font-weight:600;margin:1.5rem 0 0.5rem;
    color:var(--accent);
  }
  .topic-card h4{
    font-size:0.875rem;font-weight:600;margin:1rem 0 0.5rem;
  }
  .topic-card p{
    font-size:0.875rem;color:var(--text-muted);line-height:1.65;
    margin-bottom:0.75rem;
  }
  .topic-card ul,.topic-card ol{
    margin:0.5rem 0 1rem 1.25rem;
    font-size:0.875rem;color:var(--text-muted);
  }
  .topic-card li{margin-bottom:0.375rem}
  .topic-card li strong{color:var(--text);font-weight:600}
  .topic-card code{
    font-family:'DM Mono',monospace;font-size:0.8125rem;
    background:var(--surface-raised);color:var(--accent);
    padding:0.125rem 0.375rem;border-radius:2px;
  }
  .topic-card pre{
    background:var(--surface-raised);border:1px solid var(--border);
    padding:1rem;overflow-x:auto;margin:0.75rem 0;border-radius:2px;
  }
  .topic-card pre code{
    background:none;padding:0;color:var(--text);font-size:0.75rem;
    line-height:1.7;
  }
  .topic-card table{
    width:100%;border-collapse:collapse;margin:0.75rem 0;
    font-size:0.8125rem;
  }
  .topic-card th{
    text-align:left;padding:0.5rem 0.75rem;
    border-bottom:1px solid var(--border);
    font-weight:600;color:var(--text);font-size:0.75rem;
  }
  .topic-card td{
    padding:0.5rem 0.75rem;border-bottom:1px solid var(--border);
    color:var(--text-muted);
  }
  .topic-card td code{font-size:0.75rem}
  .topic-card a{
    color:var(--accent);text-decoration:none;
    border-bottom:1px solid transparent;
    transition:border-color 0.2s;
  }
  .topic-card a:hover{border-bottom-color:var(--accent)}
  .topic-card hr{
    border:none;border-top:1px solid var(--border);margin:1.5rem 0;
  }
  .topic-card blockquote{
    border-left:2px solid var(--accent);padding:0.25rem 1rem;
    margin:0.75rem 0;font-size:0.8125rem;color:var(--accent);
  }

  /* tag badges */
  .tag{
    display:inline-block;font-family:'DM Mono',monospace;
    font-size:0.625rem;padding:0.125rem 0.5rem;
    border-radius:2px;margin-right:0.375rem;
  }
  .tag-red{background:rgba(217,64,64,0.1);color:var(--red)}
  .tag-green{background:rgba(58,138,74,0.1);color:var(--green)}

  /* mobile */
  @media(max-width:768px){
    aside{
      position:relative;width:100%;height:auto;
      border-right:none;border-bottom:1px solid var(--border);
      padding:1rem 0;
    }
    .sidebar-header{padding:0 1rem 1rem}
    nav a{padding:0.3rem 1rem}
    nav .nav-group{padding:0.25rem 1rem}
    main{margin-left:0;padding:1.25rem}
  }

  /* scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent-dim)}

  .error-card{
    background:var(--surface);border:1px solid var(--red);
    padding:1.5rem;margin-bottom:1.5rem;border-radius:2px;
  }
  .error-card .topic-meta{color:var(--red)}
</style>
</head>
<body>

<div id="loading">Loading memory...</div>

<aside>
  <div class="sidebar-header">
    <h1>Memory<br>Knowledge Base</h1>
    <div class="sub">WorkBuddy User Memory</div>
    <div class="stats" id="nav-stats"></div>
  </div>
  <nav id="sidebar-nav"></nav>
</aside>

<main id="content"></main>

<script>
(async function() {
  const base = location.pathname.replace(/\/[^/]*$/, '');
  const topicsBase = 'topics/';
  const MEMORY_MD = 'MEMORY.md';

  async function fetchMD(path) {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
    return await resp.text();
  }

  function parseMemoryIndex(md) {
    // Extract all topic entries from the table
    const entries = [];
    const lines = md.split('\n');
    let inTable = false;
    for (const line of lines) {
      if (line.startsWith('|') && line.includes('topics/')) {
        const cols = line.split('|').map(c => c.trim()).filter(Boolean);
        if (cols.length >= 2) {
          // Try to extract filename from markdown link or backtick
          const fileMatch = cols[1]?.match(/`?topics\/([^`)]+)`?/);
          if (fileMatch) {
            entries.push({
              topic: cols[0]?.replace(/\*\*/g, '') || fileMatch[1].replace('.md',''),
              file: fileMatch[1],
            });
          }
        }
      }
    }
    // De-duplicate by file
    const seen = new Set();
    return entries.filter(e => { const k = e.file; if (seen.has(k)) return false; seen.add(k); return true; });
  }

  function renderMarkdown(md) {
    marked.setOptions({ breaks: true, gfm: true });
    return marked.parse(md);
  }

  // Fetch all topic files
  let topicEntries = [];
  let topicsData = {};
  let errors = [];

  try {
    const memoryMD = await fetchMD(MEMORY_MD);
    topicEntries = parseMemoryIndex(memoryMD);
  } catch(e) {
    errors.push(`Failed to load ${MEMORY_MD}: ${e.message}`);
    // Fallback: list known topics
    topicEntries = [
      {topic:'编码风格', file:'coding-style.md'},
      {topic:'工作习惯', file:'work-habits.md'},
      {topic:'项目结构规范', file:'project-structure.md'},
      {topic:'MCP 使用规则', file:'mcp-rules.md'},
      {topic:'Flutter 项目通用规则', file:'flutter.md'},
      {topic:'Wind 配置规范', file:'wind-config.md'},
      {topic:'shadcn-vue 使用规范', file:'shadcn-vue.md'},
      {topic:'Impeccable 设计工具集', file:'impeccable.md'},
      {topic:'前端项目通用规则', file:'frontend-rules.md'},
      {topic:'Impeccable 设计工具集', file:'impeccable.md'},
      {topic:'当前项目列表', file:'current-projects.md'},
      {topic:'Flutter 桌面截图', file:'flutter-screenshot.md'},
    ];
    // deduplicate
    const seen = new Set();
    topicEntries = topicEntries.filter(e => { const k = e.file; if (seen.has(k)) return false; seen.add(k); return true; });
  }

  // Fetch all topics in parallel
  const fetches = topicEntries.map(async entry => {
    try {
      const md = await fetchMD(topicsBase + entry.file);
      topicsData[entry.file] = { md, entry };
    } catch(e) {
      errors.push(`Failed to load ${entry.file}: ${e.message}`);
      topicsData[entry.file] = { md: null, entry, error: e.message };
    }
  });
  await Promise.all(fetches);

  // Remove loading
  document.getElementById('loading').remove();

  // Build sidebar navigation
  const nav = document.getElementById('sidebar-nav');
  const content = document.getElementById('content');
  const navStats = document.getElementById('nav-stats');

  // Separate into "always" and "conditional"
  const alwaysFiles = ['coding-style.md','work-habits.md','project-structure.md','mcp-rules.md'];
  const alwaysTopics = topicEntries.filter(e => alwaysFiles.includes(e.file));
  const conditionalTopics = topicEntries.filter(e => !alwaysFiles.includes(e.file));

  navStats.textContent = `${topicEntries.length} topics loaded`;

  function buildNavGroup(label, entries) {
    const group = document.createElement('div');
    group.className = 'nav-group';
    group.textContent = label;
    nav.appendChild(group);
    entries.forEach(e => {
      const a = document.createElement('a');
      a.href = `#${e.file.replace('.md','')}`;
      a.textContent = e.topic;
      nav.appendChild(a);
    });
  }

  buildNavGroup('Always Read', alwaysTopics);
  buildNavGroup('By Project', conditionalTopics);

  // Build content
  // Overview section
  const overview = document.createElement('div');
  overview.className = 'overview';
  overview.innerHTML = `
    <h2>User Memory — 用户记忆知识库</h2>
    <p>此页面动态关联 <code>~/.workbuddy/memory/topics/</code> 下所有 Markdown 文件。每次刷新页面即获取最新内容 — 编辑 MD 文件后只需刷新浏览器。</p>
    <blockquote>⚠️ 同步规则：修改 topics/ 下任意文件后，须同步到 <code>D:\\hxy\\github\\workbuddy-sync/</code> 并 commit + push。</blockquote>
    <p style="margin-bottom:0">共 <strong>${topicEntries.length}</strong> 个主题 · ${errors.length ? `<span style="color:var(--red)">${errors.length} 个加载失败</span>` : '<span style="color:var(--green)">全部加载成功</span>'}</p>
  `;
  content.appendChild(overview);

  // Error cards
  if (errors.length) {
    errors.forEach(err => {
      const card = document.createElement('div');
      card.className = 'error-card';
      card.textContent = err;
      content.appendChild(card);
    });
  }

  // Topic cards
  topicEntries.forEach(entry => {
    const data = topicsData[entry.file];
    const id = entry.file.replace('.md','');
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.id = id;

    const tagClass = alwaysFiles.includes(entry.file) ? 'tag-red' : 'tag-green';
    const tagLabel = alwaysFiles.includes(entry.file) ? '通用' : '按项目';

    if (data && data.md) {
      card.innerHTML = `
        <div class="topic-meta">
          <span class="tag ${tagClass}">${tagLabel}</span>
          ${data.entry.file}
        </div>
        ${renderMarkdown(data.md)}
      `;
    } else {
      card.innerHTML = `
        <div class="topic-meta">
          <span class="tag tag-red">Error</span>
          ${entry.file}
        </div>
        <h2>${entry.topic}</h2>
        <p style="color:var(--red)">加载失败: ${data?.error || 'Unknown'}</p>
      `;
    }

    content.appendChild(card);
  });

  // Active nav on scroll
  const navLinks = nav.querySelectorAll('a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const link = nav.querySelector(`a[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -75% 0px' });

  document.querySelectorAll('.topic-card[id]').forEach(c => observer.observe(c));

})();
</script>

</body>
</html>
